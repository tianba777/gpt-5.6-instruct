name: Render Star History

on:
  schedule:
    - cron: "23 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: star-history-pages
  cancel-in-progress: true

env:
  STAR_HISTORY_REPOSITORY: mdx-tom/gpt-5.6-instruct
  STAR_HISTORY_SOURCE_REF: main
  STAR_HISTORY_SOURCE_DIR: .star-history-upstream
  STAR_HISTORY_SITE_DIR: .star-history-site
  STAR_HISTORY_PAGES_URL: https://mdx-tom.github.io/gpt-5.6-instruct

jobs:
  render-and-deploy:
    name: Render with official source and deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out this repository
        uses: actions/checkout@v4

      - name: Check out official Star History source
        uses: actions/checkout@v4
        with:
          repository: star-history/star-history
          ref: ${{ env.STAR_HISTORY_SOURCE_REF }}
          path: ${{ env.STAR_HISTORY_SOURCE_DIR }}
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: |
            .star-history-upstream/pnpm-lock.yaml
            .star-history-upstream/backend/pnpm-lock.yaml

      - name: Install official renderer dependencies
        shell: bash
        run: |
          set -euo pipefail
          (cd "${STAR_HISTORY_SOURCE_DIR}" && pnpm install --frozen-lockfile)
          (cd "${STAR_HISTORY_SOURCE_DIR}/backend" && pnpm install --frozen-lockfile)

      - name: Render official light and dark charts locally
        id: render
        shell: bash
        env:
          GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          token_file="${RUNNER_TEMP}/star-history-token.env"
          server_log="${RUNNER_TEMP}/star-history-backend.log"
          umask 077
          printf '%s' "${GITHUB_API_TOKEN}" > "${token_file}"

          token_source="${STAR_HISTORY_SOURCE_DIR}/backend/token.ts"
          python3 - "${token_source}" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          source = path.read_text()
          original = 'await api.getRepoStargazersCount("star-history/star-history", token);'
          replacement = (
              'await api.getRepoStargazersCount('
              'process.env.STAR_HISTORY_TOKEN_TEST_REPO || "star-history/star-history", token);'
          )
          if source.count(original) != 1:
              raise SystemExit("unexpected upstream token validation implementation")
          path.write_text(source.replace(original, replacement))
          PY

          cleanup() {
            if [[ -n "${server_pid:-}" ]]; then
              kill "${server_pid}" 2>/dev/null || true
              wait "${server_pid}" 2>/dev/null || true
            fi
            rm -f "${token_file}"
          }
          trap cleanup EXIT

          (
            cd "${STAR_HISTORY_SOURCE_DIR}/backend"
            ENVPATH="${token_file}" \
              STAR_HISTORY_TOKEN_TEST_REPO="${STAR_HISTORY_REPOSITORY}" \
              pnpm exec tsx main.ts
          ) >"${server_log}" 2>&1 &
          server_pid=$!

          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null; then
              break
            fi
            if ! kill -0 "${server_pid}" 2>/dev/null; then
              cat "${server_log}" >&2
              exit 1
            fi
            if [[ "${attempt}" == 60 ]]; then
              cat "${server_log}" >&2
              exit 1
            fi
            sleep 1
          done

          mkdir -p "${STAR_HISTORY_SITE_DIR}"
          if ! python3 .github/scripts/render_star_history.py \
              --repository "${STAR_HISTORY_REPOSITORY}" \
              --output-dir "${STAR_HISTORY_SITE_DIR}"; then
            cat "${server_log}" >&2
            exit 1
          fi
          touch "${STAR_HISTORY_SITE_DIR}/.nojekyll"

          current_dir="$(mktemp -d)"
          changed=true
          if curl --fail --silent --location \
              "${STAR_HISTORY_PAGES_URL}/star-history-light.svg" \
              --output "${current_dir}/star-history-light.svg" && \
            curl --fail --silent --location \
              "${STAR_HISTORY_PAGES_URL}/star-history-dark.svg" \
              --output "${current_dir}/star-history-dark.svg" && \
            cmp --silent \
              "${STAR_HISTORY_SITE_DIR}/star-history-light.svg" \
              "${current_dir}/star-history-light.svg" && \
            cmp --silent \
              "${STAR_HISTORY_SITE_DIR}/star-history-dark.svg" \
              "${current_dir}/star-history-dark.svg"; then
            changed=false
            echo "The deployed charts are already current."
          fi
          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

      - name: Configure GitHub Pages
        if: steps.render.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: steps.render.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ env.STAR_HISTORY_SITE_DIR }}

      - name: Deploy Pages artifact
        if: steps.render.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
